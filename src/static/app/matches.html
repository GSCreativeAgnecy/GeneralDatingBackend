<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Matches</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/app/css/app.css?v=9">
</head>
<body>
  <div id="app"></div>

  <script src="/app/js/api.js?v=9"></script>
  <script src="/app/js/components.js?v=9"></script>
  <script>
    redirectIfNoAuth();

    const state = { mode: 'list', currentMatch: null, userId: null };

    async function loadMatchList() {
      state.mode = 'list';
      document.getElementById('app').innerHTML = `
        <div class="app-container">
          <div class="app-header">
            <span class="app-header-title" id="headerTitle">Messages</span>
          </div>
          <div id="matchList" class="chat-container" style="height:auto; overflow-y:auto; padding-bottom:100px;">
            ${loadingHTML('Loading matches...')}
          </div>
          ${buildBottomNav('matches')}
        </div>`;

      try {
        const data = await api('/matches?limit=100');
        const user = getStoredUser();
        state.userId = user ? user.id : null;

        if (!data || data.length === 0) {
          document.getElementById('matchList').innerHTML = emptyHTML('💬', 'No matches yet', 'Keep swiping to find your perfect match!', '<a href="/app" class="btn btn-primary">Start Swiping</a>');
          return;
        }

        let html = '';
        data.forEach(m => {
          const u = m.user || {};
          const initial = (u.first_name || '?')[0].toUpperCase();
          html += `
            <div class="match-item" onclick="openChat(${m.id})">
              <div class="match-item-avatar" style="display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--brown-600),var(--brown-700));color:var(--white);font-weight:800;font-size:1.3rem;">${initial}</div>
              <div class="match-item-info">
                <div class="match-item-name">${u.first_name || 'Someone'}</div>
                <div class="match-item-last">Say hello!</div>
              </div>
            </div>`;
        });
        document.getElementById('matchList').innerHTML = html;
      } catch (e) {
        document.getElementById('matchList').innerHTML = emptyHTML('⚠️', 'Failed to load', e.message);
      }
    }

    async function openChat(matchId) {
      state.mode = 'chat';
      state.currentMatch = matchId;

      try {
        const data = await api(`/matches/${matchId}`);
        const u = data.user || {};
        const initial = (u.first_name || '?')[0].toUpperCase();
        const name = u.first_name || 'Chat';

        document.getElementById('app').innerHTML = `
          <div class="app-container">
            <div class="app-header">
              <span class="app-header-back" onclick="loadMatchList()">‹</span>
              <div class="match-item-avatar" style="display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--brown-600),var(--brown-700));color:var(--white);font-weight:800;font-size:1rem;width:36px;height:36px;border-radius:50%;margin:0 10px;flex-shrink:0">${initial}</div>
              <span class="app-header-title">${name}</span>
            </div>
            <div class="chat-container">
              <div class="chat-messages" id="chatMessages">
                ${loadingHTML('Loading messages...')}
              </div>
              <div class="chat-input-area" id="chatInputArea">
                <input class="chat-input" id="msgInput" type="text" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMessage()">
                <button class="chat-send" onclick="sendMessage()">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
              </div>
            </div>
          </div>`;

        loadMessages();
      } catch (e) {
        showToast(e.message, 'error');
    loadMatchList();
    loadBranding().then(name => {
      if (name) { const h = document.getElementById('headerTitle'); if (h) h.textContent = name; }
    });
      }
    }

    async function loadMessages() {
      try {
        const data = await api(`/matches/${state.currentMatch}/messages?limit=200`);
        const container = document.getElementById('chatMessages');

        if (!data || data.length === 0) {
          container.innerHTML = `<div class="chat-date-divider">No messages yet. Say hello!</div>`;
          return;
        }

        let html = '';
        let lastDate = '';
        data.forEach(msg => {
          const msgDate = new Date(msg.created_at).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
          if (msgDate !== lastDate) {
            html += `<div class="chat-date-divider">${msgDate}</div>`;
            lastDate = msgDate;
          }
          const isMine = msg.sender_id === state.userId;
          html += `
            <div class="chat-bubble ${isMine ? 'chat-bubble-mine' : 'chat-bubble-theirs'}">
              ${msg.content}
              <div class="chat-bubble-time">${formatChatTime(msg.created_at)}</div>
            </div>`;
        });
        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
      } catch (e) {
        showToast('Failed to load messages', 'error');
      }
    }

    async function sendMessage() {
      const input = document.getElementById('msgInput');
      const content = input.value.trim();
      if (!content) return;

      try {
        await api(`/matches/${state.currentMatch}/messages`, {
          method: 'POST',
          body: JSON.stringify({ content })
        });
        input.value = '';
        loadMessages();
      } catch (e) {
        showToast(e.message, 'error');
      }
    }

    loadMatchList();
  </script>
</body>
</html>
